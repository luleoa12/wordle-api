name: Update NYT Wordle Answer (Daily)

on:
  schedule:
    - cron: "0 0 * * *"  # runs daily at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Wordle Answer
        run: |
          DATE=$(date -u +%F)
          URL="https://www.nytimes.com/svc/wordle/v2/$DATE.json"

          RESPONSE=$(curl -s $URL)
          ANSWER=$(echo $RESPONSE | jq -r '.solution' | tr '[:lower:]' '[:upper:]')

          if [ "$ANSWER" = "null" ] || [ -z "$ANSWER" ]; then
            echo "Failed to fetch answer"
            exit 1
          fi

          echo "{\"answer\":\"$ANSWER\",\"date\":\"$DATE\"}" > public/today.json

      - name: Commit and push
        run: |
          git config user.name "wordle-bot"
          git config user.email "bot@example.com"
          git add public/today.json
          git commit -m "Update Wordle answer for $DATE" || echo "No changes"
          git push
